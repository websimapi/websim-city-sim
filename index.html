<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>City Sim</title>
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="game-container"></div>
    
    <div id="ui-overlay">
        <div id="title-screen">
            <div class="menu">
                <button id="btn-continue" class="btn hidden">Continue</button>
                <button id="btn-start" class="btn">New City</button>
                <button id="btn-settings" class="btn">Settings</button>
            </div>
        </div>

        <div id="char-creation-screen" class="hidden">
            <h2>New Resident</h2>
            <div class="setting-row">
                <label>Name</label>
                <input type="text" id="char-name" value="Citizen" maxlength="12">
            </div>
            <div class="setting-row">
                <label>Shirt Color</label>
                <div id="color-options" class="color-options">
                    <div class="color-opt selected" style="background: #ff6b6b;" data-color="0xff6b6b"></div>
                    <div class="color-opt" style="background: #54a0ff;" data-color="0x54a0ff"></div>
                    <div class="color-opt" style="background: #1dd1a1;" data-color="0x1dd1a1"></div>
                    <div class="color-opt" style="background: #feca57;" data-color="0xfeca57"></div>
                </div>
            </div>
            <div class="menu-row">
                <button id="btn-cancel-char" class="btn">Back</button>
                <button id="btn-confirm-char" class="btn primary">Enter City</button>
            </div>
        </div>
        
        <div id="settings-screen" class="hidden">
            <h2>Settings</h2>
            <div class="setting-row">
                <label>Traffic Volume</label>
                <input type="range" min="0" max="100" value="50" id="setting-traffic">
            </div>
            <button id="btn-back" class="btn">Back</button>
        </div>

        <div id="hud" class="hidden">
            <button id="btn-menu" class="btn-icon">☰</button>
            <div class="stats">
                <div>Pop: <span id="stat-pop">0</span></div>
                <div>Cars: <span id="stat-cars">0</span></div>
            </div>
        </div>
    </div>

    <script type="module" src="./src/main.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
